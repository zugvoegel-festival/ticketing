name: Deploy Pretix via SSH

# SSH pull + restart after a successful pretix-build.yml run, or manual dispatch.
# Does NOT run nixos-rebuild — host module pins are applied separately via ./deploy.sh.

on:
  workflow_run:
    workflows: ["Build Pretix Docker Image"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      version:
        description: 'Immutable image tag (e.g. 1.2.0) — empty = read from environments/pretix.nix'
        required: false
        type: string

env:
  REGISTRY: docker.io
  IMAGE_NAME: manulinger/zv-ticketing
  SERVER_HOST_DEFAULT: 185.232.69.172
  SERVER_HOST_ALIAS: pretix-server-01
  HEALTH_URL: https://tickets.zugvoegelfestival.org/

jobs:
  deploy:
    name: Deploy Pretix
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'refs/tags/pretix-v')) ||
      github.event_name == 'workflow_dispatch'
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout ticketing repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve Docker image tag
        id: docker-tag
        run: |
          VERSION=""
          HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
          if [[ "$HEAD_BRANCH" =~ ^refs/tags/pretix-v(.+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            NIX_TAG=$(grep 'pretixImage' environments/pretix.nix | sed -n 's/.*manulinger\/zv-ticketing:\([^"]*\)".*/\1/p')
            VERSION="$NIX_TAG"
          fi
          if [[ -z "$VERSION" ]]; then
            echo "::error::Could not resolve Pretix Docker tag"
            exit 1
          fi
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "Docker tag: $VERSION"

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -z "${{ secrets.SSH_KNOWN_HOSTS }}" ]; then
            echo "::error::SSH_KNOWN_HOSTS secret is required. Populate with: ssh-keyscan -H 185.232.69.172"
            exit 1
          fi
          SSH_HOST="${{ secrets.SSH_HOST }}"
          if [ -z "$SSH_HOST" ]; then
            SSH_HOST="${{ env.SERVER_HOST_DEFAULT }}"
          fi
          {
            echo "Host ${{ env.SERVER_HOST_ALIAS }}"
            echo "  HostName $SSH_HOST"
            echo "  User deploy"
            echo "  StrictHostKeyChecking yes"
          } >> ~/.ssh/config
          chmod 600 ~/.ssh/config
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Verify SSH connection
        run: ssh ${{ env.SERVER_HOST_ALIAS }} "echo 'SSH connection successful'"

      - name: Pre-deployment backup
        run: |
          ssh ${{ env.SERVER_HOST_ALIAS }} "sudo pretix-deploy-backup predeploy-v${{ steps.docker-tag.outputs.tag }}"

      - name: Pull image and restart pretix container
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.docker-tag.outputs.tag }}"
          echo "Pulling $IMAGE..."
          ssh ${{ env.SERVER_HOST_ALIAS }} "sudo docker pull $IMAGE"
          echo "Restarting docker-pretix.service..."
          ssh ${{ env.SERVER_HOST_ALIAS }} "sudo systemctl restart docker-pretix.service"

      - name: Wait for service
        run: sleep 15

      - name: Health check
        run: |
          echo "Checking ${{ env.HEALTH_URL }} ..."
          curl -sf --retry 8 --retry-delay 5 --retry-connrefused -o /dev/null -w '%{http_code}\n' "${{ env.HEALTH_URL }}" | grep -qE '^(200|301|302)$'

      - name: Deployment summary
        run: |
          {
            echo "## Pretix deployment — ${{ steps.docker-tag.outputs.tag }}"
            echo "- **Image:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.docker-tag.outputs.tag }}"
            echo "- **URL:** ${{ env.HEALTH_URL }}"
          } >> $GITHUB_STEP_SUMMARY
