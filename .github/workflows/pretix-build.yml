name: Build Pretix Docker Image

# Builds the custom Pretix image from zugvoegel-festival/pretix and pushes to Docker Hub.
# Source of truth for the Dockerfile: github.com/zugvoegel-festival/pretix (not this repo).
#
# Triggers:
# - pretix-v*.*.* tags on this repo (e.g. pretix-v1.2.0)
# - workflow_dispatch with optional version override

on:
  push:
    tags:
      - 'pretix-v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Image semver (e.g. 1.2.0) — defaults to tag suffix or manual input'
        required: false
        type: string
      pretix_ref:
        description: 'Git ref of zugvoegel-festival/pretix to build'
        required: false
        default: 'main'
        type: string

env:
  REGISTRY: docker.io
  IMAGE_NAME: manulinger/zv-ticketing
  PRETIX_REPO: zugvoegel-festival/pretix

jobs:
  build:
    name: Build Pretix image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Extract version
        id: version
        run: |
          VERSION=""
          if [[ "${{ github.ref }}" =~ ^refs/tags/pretix-v(.+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          if [[ -z "$VERSION" ]]; then
            echo "::error::Could not determine Pretix image version"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Pretix image version: $VERSION"

      - name: Checkout pretix source
        uses: actions/checkout@v6
        with:
          repository: ${{ env.PRETIX_REPO }}
          ref: ${{ github.event.inputs.pretix_ref || 'main' }}
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
          path: pretix-src

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: pretix-src
          file: pretix-src/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pretix-latest

      - name: Summary
        run: |
          {
            echo "## Pretix build — v${{ steps.version.outputs.version }}"
            echo "- **Image:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}"
            echo "- **Floating:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pretix-latest"
            echo "- **Source:** ${{ env.PRETIX_REPO }}@${{ github.event.inputs.pretix_ref || 'main' }}"
          } >> $GITHUB_STEP_SUMMARY
